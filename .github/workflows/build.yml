name: Build
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-26.04
    permissions:
      packages: write
      contents: read

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      BUILD_IMAGE: nas-container
      BUILD_BRANCH: 44
      BUILD_TAG: 44

    steps:
      - name: Prepare environment
        run: |
          echo "BUILD_REGISTRY=ghcr.io/${REPO_OWNER,,}" >> ${GITHUB_ENV}

      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - uses: extractions/setup-just@v4

      - name: Pull
        id: pull
        run: |
          just pull

      - name: Build
        id: build
        run: just build

      - name: Rechunk
        id: rechunk
        run: |
          just rechunk

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOGIN_USER: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | sudo podman login -u "${LOGIN_USER}" --password-stdin "ghcr.io"

      - name: Push to GHCR
        id: push
        env:
          REGISTRY: ${{ env.BUILD_REGISTRY }}
          IMAGE: ${{ env.BUILD_IMAGE }}
          TAG: ${{ env.BUILD_TAG }}
        run: |
          set -x
          # HACK: push a second time so layer annotations are present
          # TODO: remove me when https://github.com/containers/podman/issues/27796 fixed
          sudo podman push "$REGISTRY/$IMAGE:$TAG"
          sudo podman push "$REGISTRY/$IMAGE:$TAG"
